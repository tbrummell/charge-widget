<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ottawa Charge · PWHL Ticker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0e0e1c;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .ticker-wrap {
    background: #1a1a2e;
    border-radius: 8px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
    width: 100%;
    max-width: 850px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .ticker-inner {
    display: flex;
    align-items: stretch;
    height: 85px;
  }
  .games-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .games-track {
    display: flex;
    height: 100%;
    transition: transform 0.5s ease-in-out;
  }
  .game-card {
    flex: 0 0 170px; /* Fixed width to prevent "stopped scrolling" look */
    height: 100%;
    border-right: 1px solid #2a2a44;
    padding: 10px 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    color: #e0e0e0;
    font-size: 13px;
  }
  .team-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }
  .team-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .team-abbr.ottawa { color: #fff; font-weight: bold; }
  .score {
    font-weight: 800;
    font-size: 16px;
    color: #fff;
  }
  .score.winner { color: #e8c96a; }

  .game-status {
    font-size: 10px;
    color: #555577;
    text-transform: uppercase;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge {
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: bold;
    font-size: 9px;
  }
  .win { background: #2e7d32; color: #fff; }
  .loss { background: #c62828; color: #fff; }

  .ticker-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #111122;
    padding: 4px 12px;
    height: 24px;
    font-size: 9px;
    color: #444466;
  }
  .footer-brand span { color: #C8102E; font-weight: 600; }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-inner">
    <div class="games-viewport">
      <div class="games-track" id="track">
        <div style="padding: 20px; color: #444466;">Loading Charge Schedule...</div>
      </div>
    </div>
  </div>
  <div class="ticker-footer">
    <div>OTTAWA <span>CHARGE</span> &nbsp;·&nbsp; PWHL 2025–26</div>
    <div id="update-label">↻ refreshing...</div>
  </div>
</div>

<script>
const ALL_GAMES = [
  { id: 277, date: '2026-03-04', away: 'SEA', home: 'OTT' }, // 4-3 W
  { id: 279, date: '2026-03-08', away: 'OTT', home: 'NY'  }, // 2-6 L
  { id: 285, date: '2026-03-14', away: 'VAN', home: 'OTT' }, // 3-2 W
  { id: 290, date: '2026-03-18', away: 'OTT', home: 'MIN' }, // 0-5 L
  { id: 295, date: '2026-03-22', away: 'MTL', home: 'OTT' }, // 2-1 W (LAST NIGHT)
  { id: 303, date: '2026-03-29', away: 'OTT', home: 'SEA' }, // NEXT
  { id: 306, date: '2026-04-01', away: 'TOR', home: 'OTT' }
];

const TEAM_COLORS = {
  'OTT': '#C8102E', 'MTL': '#862633', 'MIN': '#154734',
  'NY': '#003366', 'SEA': '#005C5C', 'VAN': '#00843D',
  'TOR': '#307FE2', 'BOS': '#FFD700'
};

function teamLogo(abbr) {
  const color = TEAM_COLORS[abbr] || '#555';
  return `<svg width="18" height="18" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="9" fill="${color}"/>
    <text x="10" y="13.5" font-size="6" font-weight="900" fill="#fff" text-anchor="middle" font-family="sans-serif">${abbr}</text>
  </svg>`;
}

async function fetchScores() {
  const url = 'https://www.thepwhl.com/en/scores';
  try {
    const resp = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    const data = await resp.json();
    const html = data.contents;
    const results = {};

    html.split(/game-center\//).forEach(chunk => {
      const idM = chunk.match(/^(\d+)/);
      if(!idM) return;
      const id = parseInt(idM[1]);
      const slice = chunk.slice(0, 1500);

      const isFinal = /Final|FINAL/i.test(slice);
      const isLive = /(1st|2nd|3rd|OT|SO)\s*Period|Live/i.test(slice);

      // Look for numbers wrapped in HTML tags (standard scoreboard pattern)
      const nums = [...slice.matchAll(/>(\d+)</g)].map(x => parseInt(x[1])).filter(n => n >= 0 && n <= 15);

      let awayScore, homeScore;
      if((isFinal || isLive) && nums.length >= 2) {
        awayScore = nums[0];
        homeScore = nums[1];
      }

      results[id] = { awayScore, homeScore, isFinal, isLive };
    });
    return results;
  } catch(e) { return {}; }
}

function buildCards(scoreMap) {
  const track = document.getElementById('track');
  track.innerHTML = '';
  const today = new Date().setHours(0,0,0,0);

  ALL_GAMES.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card';
    const res = scoreMap[game.id] || {};
    const isPast = new Date(game.date) < today;

    // Win/Loss Calculation
    let resultBadge = '';
    if (res.isFinal || (isPast && res.awayScore !== undefined)) {
      const isOttHome = game.home === 'OTT';
      const ottScore = isOttHome ? res.homeScore : res.awayScore;
      const oppScore = isOttHome ? res.awayScore : res.homeScore;
      if (ottScore > oppScore) resultBadge = '<span class="badge win">W</span>';
      else if (ottScore < oppScore) resultBadge = '<span class="badge loss">L</span>';
    }

    const awayWon = res.isFinal && res.awayScore > res.homeScore;
    const homeWon = res.isFinal && res.homeScore > res.awayScore;

    card.innerHTML = `
      <div class="team-row">
        <div class="team-info">
          ${teamLogo(game.away)}
          <span class="team-abbr ${game.away==='OTT'?'ottawa':''}">${game.away}</span>
        </div>
        <span class="score ${awayWon?'winner':''}">${res.awayScore ?? ''}</span>
      </div>
      <div class="team-row">
        <div class="team-info">
          ${teamLogo(game.home)}
          <span class="team-abbr ${game.home==='OTT'?'ottawa':''}">${game.home}</span>
        </div>
        <span class="score ${homeWon?'winner':''}">${res.homeScore ?? ''}</span>
      </div>
      <div class="game-status">
        <span>${res.isFinal ? 'Final' : (isPast ? 'Final' : game.date.split('-').slice(1).join('/'))}</span>
        ${resultBadge}
      </div>
    `;
    track.appendChild(card);
  });
}

async function init() {
  const scores = await fetchScores();
  buildCards(scores);
  document.getElementById('update-label').textContent = 'Last Updated: ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

init();
setInterval(init, 300000); // 5-minute refresh
</script>
</body>
</html>
