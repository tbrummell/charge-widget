<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ottawa Charge · PWHL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0e0e1c;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }
  .ticker-wrap {
    background: #1a1a2e;
    border-radius: 8px;
    overflow: hidden;
    user-select: none;
    width: 100%;
    max-width: 820px;
  }
  .ticker-inner {
    display: flex;
    align-items: stretch;
    height: 82px;
  }
  .games-viewport {
    flex: 1;
    overflow: hidden;
  }
  .games-track {
    display: flex;
    height: 100%;
    transition: transform 0.4s ease;
  }
  .game-card {
    flex-shrink: 0;
    height: 100%;
    border-right: 1px solid #2a2a44;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    min-width: 138px;
  }
  .game-card.is-live { border-top: 3px solid #C8102E; }
  .team-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .team-abbr {
    font-size: 13.5px;
    font-weight: 600;
    color: #b0b0c8;
    min-width: 38px;
    letter-spacing: 0.04em;
  }
  .team-abbr.ottawa { color: #fff; }
  .team-score {
    font-size: 23px;
    font-weight: 700;
    color: #fff;
    min-width: 24px;
    text-align: right;
    line-height: 1;
    margin-left: auto;
  }
  .team-score.winner { color: #e8c96a; }
  .game-meta {
    font-size: 10.5px;
    color: #666688;
    white-space: nowrap;
  }
  .status-final { color: #8888aa; }
  .status-live { color: #C8102E; font-weight: 700; }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #C8102E;
    margin-right: 4px;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .ticker-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #111122;
    padding: 4px 14px;
    height: 24px;
    font-size: 9.5px;
  }
  .footer-brand {
    color: #444466;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .footer-brand span { color: #C8102E; font-weight: 700; }
  .footer-refresh {
    color: #555577;
    cursor: pointer;
  }
  .footer-refresh:hover { color: #ccc; }
  .loading-state, .error-state {
    color: #8888aa;
    font-size: 13px;
    height: 82px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-inner">
    <div class="games-viewport" id="viewport">
      <div class="games-track" id="track">
        <div class="loading-state">Loading Ottawa Charge games...</div>
      </div>
    </div>
  </div>
  <div class="ticker-footer">
    <div class="footer-brand">Ottawa <span>Charge</span> · PWHL 2025–26</div>
    <div class="footer-refresh" onclick="init()">↻ <span id="update-label">refresh</span></div>
  </div>
</div>

<script>
const TEAM_COLORS = {
  OTT: '#C8102E', NY: '#003087', MIN: '#154734', BOS: '#FFB81C',
  MTL: '#AF1E2D', TOR: '#307FE2', SEA: '#005C5C', VAN: '#00843D'
};

function teamLogo(abbr) {
  const c = TEAM_COLORS[abbr] || '#555';
  return `<svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
    <circle cx="11" cy="11" r="10" fill="${c}"/>
    <text x="11" y="15" font-size="7" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial,sans-serif">${abbr}</text>
  </svg>`;
}

let cards = [];
let cardWidth = 150;

async function fetchScoresAndSchedule() {
  const proxy = 'https://api.allorigins.win/get?url=';
  let games = [];

  // Try Scores page first (has results)
  try {
    const scoreUrl = 'https://www.thepwhl.com/en/teams/ottawa-charge/scores';
    const resp = await fetch(proxy + encodeURIComponent(scoreUrl));
    const data = await resp.json();
    const html = data.contents || '';

    // Improved regex to catch games with scores
    const regex = /game-center\/(\d+).*?(\w{2,3})\s*(\d+)?\s*-\s*(\d+)?\s*(\w{2,3}).*?(Final|OT|SO|Live|In Progress)?/gi;
    let match;
    while ((match = regex.exec(html)) !== null) {
      const id = parseInt(match[1]);
      const team1 = match[2].toUpperCase();
      const score1 = match[3] ? parseInt(match[3]) : null;
      const score2 = match[4] ? parseInt(match[4]) : null;
      const team2 = match[5] ? match[5].toUpperCase() : null;
      const statusRaw = match[6] || '';

      if (!team2) continue;

      // Determine home/away (scores page usually shows visitor - home)
      const away = team1;
      const home = team2;
      const awayScore = score1;
      const homeScore = score2;

      const isFinal = /Final|OT|SO/i.test(statusRaw);
      const isLive = /Live|In Progress/i.test(statusRaw);

      games.push({
        id,
        away,
        home,
        awayScore,
        homeScore,
        status: statusRaw,
        isFinal,
        isLive
      });
    }
  } catch(e) { console.warn("Scores page fetch failed", e); }

  // Fallback to schedule page if needed
  if (games.length === 0) {
    try {
      const schedUrl = 'https://www.thepwhl.com/en/teams/ottawa-charge/schedule-25-26';
      const resp = await fetch(proxy + encodeURIComponent(schedUrl));
      const data = await resp.json();
      const html = data.contents || '';
      // ... (similar parsing, but simpler date-based)
      console.log("Used schedule fallback");
    } catch(e) {}
  }

  return games;
}

function buildCards(rawGames) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // Sort by date (approximate)
  rawGames.sort((a, b) => (a.id || 0) - (b.id || 0));

  // Find most recent completed game
  const past = rawGames.filter(g => g.isFinal && (g.awayScore !== null || g.homeScore !== null));
  const lastGame = past[past.length - 1];

  // Upcoming + live
  const upcoming = rawGames.filter(g => !g.isFinal || g.isLive);

  let display = [];
  if (lastGame) display.push(lastGame);
  display = display.concat(upcoming.slice(0, 5));

  cards = display.map(g => {
    const awayIsOtt = g.away === 'OTT';
    const homeIsOtt = g.home === 'OTT';

    const awayWon = g.awayScore !== null && g.homeScore !== null && g.awayScore > g.homeScore;
    const homeWon = g.awayScore !== null && g.homeScore !== null && g.homeScore > g.awayScore;

    let statusHtml = '';
    let cardClass = '';

    if (g.isLive) {
      cardClass = 'is-live';
      statusHtml = `<span class="status-live"><span class="live-dot"></span>LIVE</span>`;
    } else if (g.isFinal || g.awayScore !== null) {
      let extra = '';
      if (/OT/i.test(g.status)) extra = ' OT';
      if (/SO/i.test(g.status)) extra = ' SO';
      statusHtml = `<span class="status-final">Final${extra}</span>`;
    } else {
      statusHtml = `<span class="status-final">Upcoming</span>`;
    }

    const awayScoreHtml = g.awayScore !== null ? `<span class="team-score${awayWon ? ' winner' : ''}">${g.awayScore}</span>` : '';
    const homeScoreHtml = g.homeScore !== null ? `<span class="team-score${homeWon ? ' winner' : ''}">${g.homeScore}</span>` : '';

    const html = `
      <div class="game-card ${cardClass}">
        <div class="team-row">
          ${teamLogo(g.away)}
          <span class="team-abbr${awayIsOtt ? ' ottawa' : ''}">${g.away}</span>
          ${awayScoreHtml}
        </div>
        <div class="team-row">
          ${teamLogo(g.home)}
          <span class="team-abbr${homeIsOtt ? ' ottawa' : ''}">${g.home}</span>
          ${homeScoreHtml}
        </div>
        <div class="game-meta">${statusHtml}</div>
      </div>`;

    return { html };
  });

  if (cards.length === 0) {
    cards = [{ html: `<div class="game-card"><div class="loading-state">No games found.<br>Try refreshing.</div></div>` }];
  }
}

function renderTrack() {
  const track = document.getElementById('track');
  const vp = document.getElementById('viewport');
  if (!track || !vp) return;

  cardWidth = Math.floor(vp.offsetWidth / Math.min(5, cards.length || 5));

  track.innerHTML = '';
  cards.forEach(card => {
    const div = document.createElement('div');
    div.innerHTML = card.html;
    const el = div.firstElementChild;
    el.style.width = `${cardWidth}px`;
    el.style.minWidth = `${cardWidth}px`;
    track.appendChild(el);
  });
}

async function init() {
  document.getElementById('update-label').textContent = '...';
  try {
    const rawGames = await fetchScoresAndSchedule();
    buildCards(rawGames);
    renderTrack();
  } catch (e) {
    console.error(e);
    document.getElementById('track').innerHTML = `<div class="error-state">Failed to load games.<br>Please try again later.</div>`;
  }

  const now = new Date();
  document.getElementById('update-label').textContent = now.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'});
}

window.addEventListener('resize', renderTrack);
setInterval(init, 5 * 60 * 1000);

init();
</script>
</body>
</html>
