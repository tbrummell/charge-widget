<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ottawa Charge · PWHL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0e0e1c;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }
  .ticker-wrap {
    background: #1a1a2e;
    border-radius: 8px;
    overflow: hidden;
    user-select: none;
    width: 100%;
    max-width: 820px;
  }
  .ticker-inner {
    display: flex;
    align-items: stretch;
    height: 82px;
  }
  .games-viewport {
    flex: 1;
    overflow: hidden;
  }
  .games-track {
    display: flex;
    height: 100%;
    transition: transform 0.4s ease;
  }
  .game-card {
    flex-shrink: 0;
    height: 100%;
    border-right: 1px solid #2a2a44;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    min-width: 138px;
  }
  .game-card.is-live { border-top: 3px solid #C8102E; }
  .team-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .team-abbr {
    font-size: 13.5px;
    font-weight: 600;
    color: #b0b0c8;
    min-width: 38px;
    letter-spacing: 0.04em;
  }
  .team-abbr.ottawa { color: #fff; }
  .team-score {
    font-size: 23px;
    font-weight: 700;
    color: #fff;
    min-width: 24px;
    text-align: right;
    line-height: 1;
    margin-left: auto;
  }
  .team-score.winner { color: #e8c96a; }
  .game-meta {
    font-size: 10.5px;
    color: #666688;
    white-space: nowrap;
  }
  .status-final { color: #8888aa; }
  .status-live { color: #C8102E; font-weight: 700; }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #C8102E;
    margin-right: 4px;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .ticker-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #111122;
    padding: 4px 14px;
    height: 24px;
    font-size: 9.5px;
  }
  .footer-brand {
    color: #444466;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .footer-brand span { color: #C8102E; font-weight: 700; }
  .footer-refresh {
    color: #555577;
    cursor: pointer;
  }
  .footer-refresh:hover { color: #ccc; }
  .loading-state {
    color: #555577;
    font-size: 13px;
    height: 82px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-inner">
    <div class="games-viewport" id="viewport">
      <div class="games-track" id="track">
        <div class="loading-state">Loading Ottawa Charge games...</div>
      </div>
    </div>
  </div>
  <div class="ticker-footer">
    <div class="footer-brand">Ottawa <span>Charge</span> · PWHL 2025–26</div>
    <div class="footer-refresh" onclick="init()">↻ <span id="update-label">refresh</span></div>
  </div>
</div>

<script>
const TEAM_COLORS = {
  OTT: '#C8102E', NY: '#003087', MIN: '#154734', BOS: '#FFB81C',
  MTL: '#AF1E2D', TOR: '#307FE2', SEA: '#005C5C', VAN: '#00843D'
};

function teamLogo(abbr) {
  const c = TEAM_COLORS[abbr] || '#555';
  return `<svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
    <circle cx="11" cy="11" r="10" fill="${c}"/>
    <text x="11" y="15" font-size="7" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial,sans-serif">${abbr}</text>
  </svg>`;
}

let cards = [];
let cardWidth = 150;

async function fetchGames() {
  try {
    const proxy = 'https://api.allorigins.win/get?url=';
    const url = 'https://www.thepwhl.com/en/teams/ottawa-charge/schedule-25-26';
    const resp = await fetch(proxy + encodeURIComponent(url));
    const data = await resp.json();
    const html = data.contents;

    const gameRegex = /game-center\/(\d+).*?>([^<]+)<\/a>.*?(?:(\d+)\s*-\s*(\d+))?.*?(Final|Live|In Progress|OT|SO)?/gis;
    const matches = [...html.matchAll(gameRegex)];

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const parsedGames = [];

    for (const m of matches) {
      const id = parseInt(m[1]);
      const dateStr = m[2].trim();
      const awayScore = m[3] ? parseInt(m[3]) : null;
      const homeScore = m[4] ? parseInt(m[4]) : null;
      let status = m[5] ? m[5].trim() : '';

      // Parse date roughly from the text (e.g., "Sun, Mar 22")
      const dateMatch = dateStr.match(/(\w+),\s*(\w+)\s*(\d+)/);
      if (!dateMatch) continue;

      const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const month = monthNames.indexOf(dateMatch[2].slice(0,3)) + 1;
      const day = parseInt(dateMatch[3]);
      const year = 2025; // adjust if needed for late season
      const gameDate = new Date(year, month-1, day);

      // Determine home/away from context (simplified from page structure)
      // This is approximate — the page shows opponent vs OTT
      const isHome = dateStr.includes('OTT') && !dateStr.includes('at'); // rough heuristic
      // Better: look for the opponent name before/after
      const oppMatch = html.match(new RegExp(`(${Object.keys(TEAM_COLORS).join('|')})\\s*${dateStr.split(',')[1] || ''}`));
      const opponent = oppMatch ? oppMatch[1] : '???';

      const awayTeam = isHome ? opponent : 'OTT';
      const homeTeam = isHome ? 'OTT' : opponent;

      parsedGames.push({
        id,
        date: gameDate,
        away: awayTeam,
        home: homeTeam,
        awayScore,
        homeScore,
        status: status || (gameDate < today ? 'Final' : ''),
        isLive: /Live|In Progress/i.test(status),
        isFinal: /Final/i.test(status) || (gameDate < today && awayScore !== null)
      });
    }

    return parsedGames.sort((a,b) => a.date - b.date);
  } catch(e) {
    console.error(e);
    return [];
  }
}

function buildCards(allGames) {
  const today = new Date();
  today.setHours(0,0,0,0);

  // Find the most recent completed game
  const pastGames = allGames.filter(g => g.date < today && g.isFinal);
  const lastGame = pastGames[pastGames.length - 1];

  // Next upcoming games (including live)
  const futureGames = allGames.filter(g => g.date >= today);

  let displayGames = [];
  if (lastGame) displayGames.push(lastGame);
  displayGames = displayGames.concat(futureGames.slice(0, 5));

  cards = displayGames.map(g => {
    const isOttHome = g.home === 'OTT';
    const awayIsOtt = g.away === 'OTT';

    const awayWon = g.awayScore !== null && g.homeScore !== null && g.awayScore > g.homeScore;
    const homeWon = g.awayScore !== null && g.homeScore !== null && g.homeScore > g.awayScore;

    let statusHtml = '';
    let cardClass = '';

    if (g.isLive) {
      cardClass = 'is-live';
      statusHtml = `<span class="status-live"><span class="live-dot"></span>LIVE</span>`;
    } else if (g.isFinal || g.date < today) {
      let extra = '';
      if (g.status.includes('OT')) extra = ' OT';
      if (g.status.includes('SO')) extra = ' SO';
      statusHtml = `<span class="status-final">Final${extra}</span>`;
    } else {
      const dateStr = g.date.toLocaleDateString('en-CA', {weekday:'short', month:'short', day:'numeric'});
      statusHtml = `<span class="status-final">${dateStr}</span>`;
    }

    const awayScoreHtml = (g.awayScore !== null) 
      ? `<span class="team-score${awayWon ? ' winner' : ''}">${g.awayScore}</span>` : '';
    const homeScoreHtml = (g.homeScore !== null) 
      ? `<span class="team-score${homeWon ? ' winner' : ''}">${g.homeScore}</span>` : '';

    const html = `
      <div class="game-card ${cardClass}">
        <div class="team-row">
          ${teamLogo(g.away)}
          <span class="team-abbr${awayIsOtt ? ' ottawa' : ''}">${g.away}</span>
          ${awayScoreHtml}
        </div>
        <div class="team-row">
          ${teamLogo(g.home)}
          <span class="team-abbr${isOttHome ? ' ottawa' : ''}">${g.home}</span>
          ${homeScoreHtml}
        </div>
        <div class="game-meta">${statusHtml}</div>
      </div>`;

    return { html };
  });
}

function renderTrack() {
  const track = document.getElementById('track');
  if (!track) return;

  const vpWidth = document.getElementById('viewport').offsetWidth;
  cardWidth = Math.floor(vpWidth / Math.min(5, cards.length || 5));

  track.innerHTML = '';
  cards.forEach(card => {
    const div = document.createElement('div');
    div.innerHTML = card.html;
    const cardEl = div.firstElementChild;
    cardEl.style.width = `${cardWidth}px`;
    cardEl.style.minWidth = `${cardWidth}px`;
    track.appendChild(cardEl);
  });
}

async function init() {
  document.getElementById('update-label').textContent = '...';
  const allGames = await fetchGames();
  buildCards(allGames);
  renderTrack();

  const now = new Date();
  document.getElementById('update-label').textContent = now.toLocaleTimeString('en-CA', {hour:'2-digit', minute:'2-digit'});
}

window.addEventListener('resize', renderTrack);

// Auto refresh every 5 minutes
setInterval(init, 5 * 60 * 1000);

init();
</script>
</body>
</html>
