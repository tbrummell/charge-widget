<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ottawa Charge · PWHL Ticker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0e0e1c;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .ticker-wrap {
    background: #1a1a2e;
    border-radius: 8px;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .ticker-inner {
    display: flex;
    align-items: stretch;
    height: 90px;
  }
  .games-viewport {
    flex: 1;
    overflow: hidden;
  }
  .games-track {
    display: flex;
    height: 100%;
    transition: transform 0.5s ease-in-out;
  }
  .game-card {
    flex: 0 0 200px;
    height: 90px;
    border-right: 1px solid #2a2a44;
    padding: 10px 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    color: #e0e0e0;
    font-size: 14px;
    position: relative;
  }
  .team-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .team-row.winner {
    color: #fff;
    font-weight: bold;
  }
  .score {
    font-variant-numeric: tabular-nums;
  }
  .game-status {
    font-size: 11px;
    color: #8888b0;
    text-transform: uppercase;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  /* Win/Loss Badge Styles */
  .badge {
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: bold;
    font-size: 10px;
  }
  .win { background: #2e7d32; color: #fff; }
  .loss { background: #c62828; color: #fff; }

  #update-label {
    position: absolute;
    bottom: 5px;
    right: 10px;
    font-size: 9px;
    color: #444466;
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-inner">
    <div class="games-viewport">
      <div class="games-track" id="games-track">
        </div>
    </div>
  </div>
  <div id="update-label">Updating...</div>
</div>

<script>
// Corrected schedule for March 2026 based on official results
const ALL_GAMES = [
  { id: 68,  date: '2026-03-04', home: 'OTT', away: 'SEA', time: '7:00 PM' }, // 4-3 W
  { id: 280, date: '2026-03-08', home: 'NY',  away: 'OTT', time: '3:00 PM' }, // 2-6 L
  { id: 285, date: '2026-03-14', home: 'VAN', away: 'OTT', time: '3:00 PM' }, // 3-2 W (OT)
  { id: 290, date: '2026-03-18', home: 'MIN', away: 'OTT', time: '7:00 PM' }, // 0-5 L
  { id: 300, date: '2026-03-22', home: 'OTT', away: 'MTL', time: '7:00 PM' }, // 2-1 W (OT) - LAST NIGHT
  { id: 301, date: '2026-03-29', home: 'SEA', away: 'OTT', time: '7:00 PM' }  // NEXT GAME
];

async function fetchScores() {
  const url = 'https://www.thepwhl.com/en/scores';
  const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
  try {
    const resp = await fetch(proxy);
    const data = await resp.json();
    const html = data.contents;
    const results = {};

    // Split by Game Center links to isolate each game's data block
    html.split(/game-center\//).forEach(chunk => {
      const idM = chunk.match(/^(\d+)/);
      if(!idM) return;
      const id = parseInt(idM[1]);
      const slice = chunk.slice(0, 1000);

      const isFinal = /Final|FINAL/i.test(slice);
      const isLive = /(1st|2nd|3rd|OT|SO)\s*Period|Live|In\s*Progress/i.test(slice);

      let statusText = null;
      if(isFinal) {
        statusText = 'Final';
        if(/OT/i.test(slice)) statusText += ' (OT)';
        if(/SO/i.test(slice)) statusText += ' (SO)';
      } else if(isLive) {
        const pm = slice.match(/(1st|2nd|3rd|OT|SO)\s*Period/i);
        statusText = pm ? pm[0] : 'Live';
      }

      // Improved score extraction: looks for numbers wrapped in standard tags
      const nums = [...slice.matchAll(/>(\d+)</g)].map(x => parseInt(x[1])).filter(n => n >= 0 && n <= 15);

      let awayScore, homeScore;
      // PWHL site typically lists Away then Home in scoreboards
      if((isFinal || isLive) && nums.length >= 2) {
        awayScore = nums[0];
        homeScore = nums[1];
      }

      results[id] = { awayScore, homeScore, statusText, isFinal, isLive };
    });
    return results;
  } catch(e) {
    console.error("Score fetch error:", e);
    return {};
  }
}

function buildCards(scoreData) {
  const track = document.getElementById('games-track');
  track.innerHTML = '';

  ALL_GAMES.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card';
    const res = scoreData[game.id] || {};
    const isPast = new Date(game.date) < new Date().setHours(0,0,0,0);

    // Win/Loss Calculation for Ottawa
    let resultBadge = '';
    if (res.isFinal) {
      const isOttHome = (game.home === 'OTT');
      const ottScore = isOttHome ? res.homeScore : res.awayScore;
      const oppScore = isOttHome ? res.awayScore : res.homeScore;

      if (ottScore > oppScore) {
        resultBadge = '<span class="badge win">W</span>';
      } else if (ottScore < oppScore) {
        resultBadge = '<span class="badge loss">L</span>';
      }
    }

    const awayWinner = res.isFinal && res.awayScore > res.homeScore;
    const homeWinner = res.isFinal && res.homeScore > res.awayScore;

    card.innerHTML = `
      <div class="game-info">
        <div class="team-row ${awayWinner ? 'winner' : ''}">
          <span>${game.away}</span>
          <span class="score">${res.awayScore !== undefined ? res.awayScore : ''}</span>
        </div>
        <div class="team-row ${homeWinner ? 'winner' : ''}">
          <span>${game.home}</span>
          <span class="score">${res.homeScore !== undefined ? res.homeScore : ''}</span>
        </div>
      </div>
      <div class="game-status">
        ${res.statusText || (isPast ? 'Final' : game.time)}
        ${resultBadge}
      </div>
    `;
    track.appendChild(card);
  });
}

async function init() {
  const scores = await fetchScores();
  buildCards(scores);
  document.getElementById('update-label').textContent = 'Last Updated: ' + new Date().toLocaleTimeString();
}

// Initial load and refresh every 5 minutes
init();
setInterval(init, 300000);
</script>

</body>
</html>
