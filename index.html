<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ottawa Charge · PWHL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0e0e1c;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .ticker-wrap {
    background: #1a1a2e;
    border-radius: 8px;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    user-select: none;
    width: 100%;
    max-width: 800px;
  }
  .ticker-inner { display: flex; align-items: stretch; height: 80px; }
  .nav-btn { display: none; }
  .games-viewport { flex: 1; overflow: hidden; }
  .games-track { display: flex; height: 100%; width: 100%; }
  .game-card { flex-shrink: 0; height: 80px; border-right: 1px solid #2a2a44; padding: 0 14px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
  .game-card.is-live { border-top: 2px solid #C8102E; }
  .team-row { display: flex; align-items: center; gap: 6px; }
  .team-abbr { font-size: 13px; font-weight: 500; color: #b0b0c8; min-width: 36px; letter-spacing: 0.03em; }
  .team-abbr.ottawa { color: #ffffff; }
  .team-score { font-size: 22px; font-weight: 700; color: #ffffff; min-width: 20px; text-align: right; line-height: 1; margin-left: auto; }
  .team-score.winner { color: #e8c96a; }
  .game-meta { font-size: 10px; color: #555577; margin-top: 2px; white-space: nowrap; }
  .status-final { color: #555577; }
  .status-live { color: #C8102E; font-weight: 600; }
  .status-upcoming { color: #555577; }
  .live-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #C8102E; margin-right: 3px; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .ticker-footer { display: flex; align-items: center; justify-content: space-between; background: #111122; padding: 3px 12px; height: 22px; }
  .footer-brand { font-size: 9px; color: #333355; letter-spacing: 0.08em; text-transform: uppercase; }
  .footer-brand span { color: #C8102E; font-weight: 600; }
  .footer-refresh { font-size: 10px; color: #333355; cursor: pointer; padding: 0 4px; }
  .footer-refresh:hover { color: #aaa; }
  .loading-state { display: flex; align-items: center; justify-content: center; color: #333355; font-size: 12px; height: 80px; width: 100%; }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-inner">
    <button class="nav-btn" onclick="slide(-1)">&#8249;</button>
    <div class="games-viewport" id="viewport">
      <div class="games-track" id="track">
        <div class="loading-state">Loading Ottawa Charge schedule...</div>
      </div>
    </div>
    <button class="nav-btn" onclick="slide(1)">&#8250;</button>
  </div>
  <div class="ticker-footer">
    <div class="footer-brand">Ottawa <span>Charge</span> &nbsp;·&nbsp; PWHL 2025–26</div>
    <div class="footer-refresh" onclick="init()">↻ <span id="update-label">refresh</span></div>
  </div>
</div>

<script>
const TEAM_COLORS = {
  OTT:'#C8102E', NY:'#003087', MIN:'#154734', BOS:'#FFB81C',
  MTL:'#AF1E2D', TOR:'#307FE2', SEA:'#005C5C', VAN:'#00843D'
};

function pDate(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtShort(s){ return pDate(s).toLocaleDateString('en-CA',{month:'short',day:'numeric'}); }
function teamLogo(abbr){
  const c = TEAM_COLORS[abbr]||'#555';
  return `<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="9" fill="${c}"/><text x="10" y="13.5" font-size="5.5" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial,sans-serif">${abbr}</text></svg>`;
}

let cards = [];
let cardWidth = 130;
let visibleCount = 5;

function calcVisible(){
  const vp = document.getElementById('viewport');
  if(!vp) return;
  visibleCount = cards.length || 5;
  cardWidth = Math.floor(vp.offsetWidth / visibleCount);
}

function renderTrack(){
  const track = document.getElementById('track');
  if(!track || !cards.length) return;
  calcVisible();
  track.innerHTML = '';
  cards.forEach(c => {
    const el = document.createElement('div');
    el.innerHTML = c.html;
    const card = el.firstElementChild;
    card.style.width = cardWidth + 'px';
    card.style.minWidth = cardWidth + 'px';
    card.style.flex = '1';
    track.appendChild(card);
  });
}

function buildCards(games){
  const today = new Date(); today.setHours(0,0,0,0);
  const past = games.filter(g => new Date(g.date) < today);
  const upcoming = games.filter(g => new Date(g.date) >= today);
  const allShow = [...past.slice(-1), ...upcoming];

  cards = allShow.map(g => {
    const awayIsOtt = g.visiting_team_name.includes('Ottawa');
    const homeIsOtt = g.home_team_name.includes('Ottawa');
    const awayScore = g.visiting_goal_count;
    const homeScore = g.home_goal_count;
    const isFinal = g.game_status==='Final';
    const isLive = g.game_status==='Live';

    const awayWon = isFinal && awayScore > homeScore;
    const homeWon = isFinal && homeScore > awayScore;

    const awayScoreHtml = (isFinal || isLive) ? `<span class="team-score${awayWon?' winner':''}">${awayScore}</span>` : '';
    const homeScoreHtml = (isFinal || isLive) ? `<span class="team-score${homeWon?' winner':''}">${homeScore}</span>` : '';

    let statusHtml='', cardClass='';
    if(isLive){
      cardClass='is-live';
      // show period and time remaining if available
      const period = g.period || '';
      const timeLeft = g.time_remaining || '';
      const liveText = period && timeLeft ? `${period} ${timeLeft}` : 'Live';
      statusHtml = `<span class="status-live"><span class="live-dot"></span>${liveText}</span>`;
    }
    else if(isFinal){ statusHtml=`<span class="status-final">Final</span>`; }
    else{ cardClass='is-upcoming'; statusHtml=`<span class="status-upcoming">${fmtShort(g.date)}</span>`; }

    const html = `<div class="game-card ${cardClass}">
      <div class="team-row">
        ${teamLogo(g.visiting_team_name)}
        <span class="team-abbr${awayIsOtt?' ottawa':''}">${g.visiting_team_name}</span>
        ${awayScoreHtml}
      </div>
      <div class="team-row">
        ${teamLogo(g.home_team_name)}
        <span class="team-abbr${homeIsOtt?' ottawa':''}">${g.home_team_name}</span>
        ${homeScoreHtml}
      </div>
      <div class="game-meta">${statusHtml}</div>
    </div>`;
    return { html, isLive };
  });

  renderTrack();
}

async function fetchScores(){
  const url = 'https://lscluster.hockeytech.com/feed/index.php?feed=modulekit&view=gamesbyteam&key=1&client_code=pwhl&team_id=8&lang=en&fmt=json';
  try{
    const res = await fetch(url);
    const data = await res.json();
    // map period and time if available
    return data.SiteKit.Gamesbyteam.map(g=>{
      // HockeyTech often has period/time in keys: period_number, period_time
      const periodText = g.period_number ? ['1st','2nd','3rd','OT','SO'][g.period_number-1] : '';
      return {...g, period: periodText, time_remaining: g.period_time || ''};
    });
  }catch(e){ console.error(e); return []; }
}

async function init(){
  document.getElementById('update-label').textContent = '...';
  const games = await fetchScores();
  buildCards(games);
  document.getElementById('update-label').textContent =
    new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
}

window.addEventListener('resize', ()=>{ calcVisible(); renderTrack(); });
setInterval(init, 5*60*1000);
init();
</script>
</body>
</html>
